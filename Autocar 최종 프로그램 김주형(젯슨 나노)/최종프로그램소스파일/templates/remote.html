<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoCar Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 15px; -webkit-user-select:none; user-select:none; }
        h3 { color: #00ffcc; margin-top: 5px; margin-bottom: 15px; }
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 10px auto; max-width: 340px; }
        .data-card { background: #2a2a2a; padding: 12px; border-radius: 10px; border: 1px solid #333; text-align: center; }
        .data-label { font-size: 12px; color: #888; text-transform: uppercase; margin-bottom: 4px; }
        .data-value { font-size: 16px; font-weight: bold; color: #fff; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 14px; font-weight: bold; }
        .bg-safe { background: #28a745; color: white; }
        .bg-warn { background: #dc3545; color: white; animation: blink 1s infinite; }
        .btn { width: 85px; height: 85px; margin: 4px; font-size: 24px; cursor: pointer; background: #333; color: white; border: 2px solid #555; border-radius: 18px; }
        .btn:active { background: #00ffcc; color: black; border-color: #00ffcc; }
        .mode-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 15px; max-width: 340px; margin-left: auto; margin-right: auto; }
        .mode-btn { height: 44px; font-size: 13px; background: #333; color: white; border: 2px solid #555; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .mode-btn.active { background: #007bff; border-color: #007bff; }
        .mode-btn.active.nolidar { background: #ff8800; border-color: #ff8800; }
        .mode-btn.active.auto { background: #28a745; border-color: #28a745; }
        .mode-btn.active.line { background: #ffcc00; border-color: #ffcc00; color: #000; }
        .kill-btn { width: 220px; height: 48px; font-size: 16px; margin-top: 8px; background: #dc3545; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <h3>🏎️ 오토카 스마트 판넬</h3>
    
    <div class="dashboard">
        <div class="data-card">
            <div class="data-label">SYSTEM MODE</div>
            <div class="data-value" id="lbl-mode" style="color: #00ffcc;">MANUAL</div>
        </div>
        <div class="data-card">
            <div class="data-label">VEHICLE ACT</div>
            <div class="data-value" id="lbl-act" style="color: #ffcc00;">STOP</div>
        </div>
        <div class="data-card">
            <div class="data-label">STEER / SPEED</div>
            <div class="data-value" id="lbl-status">0° / 0%</div>
        </div>
        <div class="data-card">
            <div class="data-label">LIDAR SENSOR</div>
            <div class="data-value"><span id="lbl-obstacle" class="badge bg-safe">CLEAR</span></div>
        </div>
        <div class="data-card">
            <div class="data-label">CAM TILT</div>
            <div class="data-value" id="lbl-tilt">0</div>
        </div>
    </div>

    <div style="margin-top: 20px;">
        <button class="btn" onclick="sendControl(0, 85)">▲</button><br>
        <button class="btn" onclick="sendControl(-1, 75)">◀</button>
        <button class="btn" onclick="sendControl(0, 0)">🛑</button>
        <button class="btn" onclick="sendControl(1, 75)">▶</button><br>
        <button class="btn" onclick="sendControl(0, -75)">▼</button>
    </div>

    <div class="mode-row">
        <button class="mode-btn" onclick="camTilt('up')">📷⬆️ 카메라 위로</button>
        <button class="mode-btn" onclick="camTilt('down')">📷⬇️ 카메라 아래로</button>
    </div>

    <div class="mode-row">
        <button class="mode-btn" id="btnManual" onclick="setMode('MANUAL')">🕹️ 수동 (라이다 O)</button>
        <button class="mode-btn" id="btnManualNoLidar" onclick="setMode('MANUAL_NOLIDAR')">🕹️ 수동 (라이다 X)</button>
        <button class="mode-btn" id="btnAuto" onclick="setMode('AUTO')">🤖 사람추적</button>
        <button class="mode-btn" id="btnLine" onclick="setMode('LINE')">🛣️ 라인트레이싱</button>
    </div>

    <div class="mode-row">
        <button class="mode-btn" id="btnLedAuto" onclick="setLed('AUTO')">💡 LED 자동(조도센서)</button>
        <button class="mode-btn" id="btnLedOn" onclick="setLed('ON')">💡 LED 켜기</button>
        <button class="mode-btn" id="btnLedOff" onclick="setLed('OFF')">💡 LED 끄기</button>
    </div>
    <div id="lineDebugBox" style="display:none; margin-top:12px;">
        <div style="color:#00ffcc; font-size:13px; margin-bottom:6px;">🖼️ 라인 인식 화면 (초록=인식된 선)</div>
        <button class="mode-btn" style="width:160px; margin-bottom:8px;" onclick="refreshLineDebug()">🔄 사진 새로고침</button><br>
        <img id="lineDebugImg" src="" style="max-width:100%; border-radius:10px; border:2px solid #555;">
    </div>
    <button class="kill-btn" onclick="triggerKillSwitch()">🚨 EMERGENCY STOP</button>

    <script>
        let currentMode = "MANUAL";

        function updateUI(data) {
            currentMode = data.mode;
            document.getElementById('lbl-mode').innerText = data.mode;
            document.getElementById('lbl-act').innerText = data.action_text;
            
            let steerText = data.steering === -1 ? "LEFT" : data.steering === 1 ? "RIGHT" : "CENTER";
            document.getElementById('lbl-status').innerText = `${steerText} / ${data.speed}%`;
            
            const obsBadge = document.getElementById('lbl-obstacle');
            if(data.obstacle === "WARNING") {
                obsBadge.innerText = "WARNING";
                obsBadge.className = "badge bg-warn";
            } else {
                obsBadge.innerText = "SAFE";
                obsBadge.className = "badge bg-safe";
            }

            document.getElementById('btnManual').classList.toggle('active', currentMode === "MANUAL");
            document.getElementById('btnManualNoLidar').classList.toggle('active', currentMode === "MANUAL_NOLIDAR");
            document.getElementById('btnAuto').classList.toggle('active', currentMode === "AUTO");
            document.getElementById('btnLine').classList.toggle('active', currentMode === "LINE");

            if (data.cam_tilt !== undefined) {
                document.getElementById('lbl-tilt').innerText = data.cam_tilt;
            }

            const showLineDebug = (currentMode === "LINE");
            document.getElementById('lineDebugBox').style.display = showLineDebug ? "block" : "none";
            if (showLineDebug && !document.getElementById('lineDebugImg').src) {
                refreshLineDebug();
            }

            if (data.led_mode !== undefined) {
                document.getElementById('btnLedAuto').classList.toggle('active', data.led_mode === "AUTO");
                document.getElementById('btnLedOn').classList.toggle('active', data.led_mode === "ON");
                document.getElementById('btnLedOff').classList.toggle('active', data.led_mode === "OFF");
            }
        }

        function setLed(mode) {
            fetch(`/api/led?mode=${mode}`)
                .then(res => res.json())
                .then(data => updateUI(data));
        }

        // 계속 스트리밍하면 느려지니까, 버튼 누를 때만 최신 한 장 받아옴 (캐시 방지용 timestamp)
        function refreshLineDebug() {
            document.getElementById('lineDebugImg').src = '/debug/line.jpg?t=' + Date.now();
        }

        function camTilt(direction) {
            fetch(`/api/camtilt?direction=${direction}`)
                .then(res => res.json())
                .then(data => updateUI(data));
        }

        function sendControl(steer, speed) {
            if(currentMode === "MANUAL" || currentMode === "MANUAL_NOLIDAR") {
                fetch(`/api/control?steering=${steer}&speed=${speed}`)
                    .then(res => res.json())
                    .then(data => updateUI(data));
            }
        }

        function setMode(mode) {
            fetch(`/api/mode?mode=${mode}`)
                .then(res => res.json())
                .then(data => updateUI(data));
        }

        function triggerKillSwitch() {
            fetch('/api/kill')
                .then(res => res.json())
                .then(data => updateUI(data));
        }
        
        // 🔥 [패치된 핵심 루프] 충돌 없는 별도의 status 채널로 대시보드 무한 갱신
        setInterval(() => {
            fetch('/api/status')
                .then(res => res.json())
                .then(data => updateUI(data));
        }, 300);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>김주형 자기소개</title>

<style>
body{
    background-color:#f4f6f9;
    font-family:Arial, sans-serif;
    margin:0;
}

.container{
    width:800px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#1f4e79;
}

h2{
    color:#1f4e79;
}

.card{
    margin-top:20px;
    padding:15px;
    background:#eef5ff;
    border-radius:10px;
}
</style>

</head>
<body>

<div class="container">

    <h1>👨‍💻 김주형</h1>

    <div class="card">
        <h2>자기소개</h2>
        <p>
            안녕하세요. 저는 24세 대학생 김주형입니다.
            기계공학에 관심이 있으며 Python을 공부하고 있습니다.
        </p>
    </div>

    <div class="card">
        <h2>학업</h2>
        <ul>
            <li>공학 전공</li>
            <li>열유체공학 학습</li>
            <li>Python 프로그래밍 공부</li>
        </ul>
    </div>

    <div class="card">
        <h2>관심 분야</h2>
        <ul>
            <li>인공지능(AI)</li>
            <li>주식 투자</li>
            <li>자산 관리</li>
            <li>소프트웨어 개발</li>
        </ul>
    </div>

    <div class="card">
        <h2>보유 기술</h2>
        <ul>
            <li>Python</li>
            <li>HTML</li>
            <li>GitHub</li>
            <li>VS Code</li>
        </ul>
    </div>

    <div class="card">
        <h2>목표</h2>
        <p>
            프로그래밍 실력을 키우고 다양한 프로젝트를 수행하여
            개발자로 성장하는 것이 목표입니다.
        </p>
    </div>

</div>

</body>
</html>
